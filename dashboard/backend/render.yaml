services:
  - type: web
    name: geosentinel-backend
    runtime: python
    rootDir: dashboard/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
    autoDeploy: true
